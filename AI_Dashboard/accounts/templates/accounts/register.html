{% load static %}
<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>ثبت‌نام</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">ایجاد حساب کاربری</h2>

    <form method="post" class="space-y-6">
      {% csrf_token %}

      <!-- Username -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">نام کاربری</label>
        <input type="text" name="username" id="username"
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
               required>
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">رمز عبور</label>
        <input type="password" name="password" id="password"
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
               required>
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="confirm_password" class="block text-sm font-medium text-gray-700">تکرار رمز عبور</label>
        <input type="password" name="confirm_password" id="confirm_password"
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
               required>
      </div>

      <!-- Submit -->
      <div>
        <button type="submit"
                class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500">
          ثبت‌نام
        </button>
      </div>
    </form>

    <!-- Extra links -->
    <p class="mt-6 text-center text-sm text-gray-600">
      قبلاً حساب دارید؟
      <a href="{% url 'login' %}" class="text-blue-600 hover:underline">وارد شوید</a>
    </p>
  </div>

</body>
</html>
